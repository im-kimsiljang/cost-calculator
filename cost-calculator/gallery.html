<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery. 김실장 - 식당 원가 계산기</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/fonts-archive/JetBrainsMono/JetBrainsMono.css" rel="stylesheet">
<style>
  :root {
    --primary: #3b5fff;
    --primary-soft: #eef2ff;
    --primary-ink: #1a2a6c;
    --ink: #0a0a18;
    --ink-soft: #333344;
    --gray-900: #1a1a28;
    --gray-700: #464656;
    --gray-500: #777788;
    --gray-400: #9096a8;
    --gray-300: #b8bcc8;
    --gray-200: #dde0e8;
    --gray-150: #eaecf2;
    --gray-100: #f2f4f8;
    --gray-50:  #f7f8fb;
    --white: #ffffff;
    --bg: #d8dce8;
    --black: #0a0a18;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--black);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: block;
    min-height: 100vh;
    padding-top: 100px;
    padding-bottom: 90px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* ─────────────────────────────────────
     FLOATING HEADER PILL (top-left)
     ───────────────────────────────────── */
  .floating-header {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px 10px 10px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 100px;
    border: 1px solid rgba(0, 0, 0, 0.06);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
  }
  .floating-header .brand-icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-drag: none;
    color: #fff;
  }
  .floating-header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .floating-header p {
    font-size: 10px;
    font-weight: 600;
    color: var(--gray-500);
    letter-spacing: 0.3px;
    text-transform: uppercase;
    line-height: 1.2;
    margin-top: 1px;
  }

  /* ─────────────────────────────────────
     FLOATING MODE / LINKS (top-center)
     ───────────────────────────────────── */
  .floating-mode {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    display: flex;
    gap: 4px;
    padding: 4px;
    background: rgba(10, 10, 24, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 100px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);
  }
  .floating-mode a {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 100px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.6);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .floating-mode a:hover { color: #fff; }
  .floating-mode a.active {
    background: var(--primary);
    color: #fff;
  }

  /* ─────────────────────────────────────
     FLOATING STATS (top-right)
     ───────────────────────────────────── */
  .floating-stats {
    position: fixed;
    top: 24px;
    right: 20px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 100px;
    border: 1px solid rgba(0, 0, 0, 0.06);
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    font-size: 12px;
    color: var(--gray-500);
    font-weight: 500;
  }
  .floating-stats strong {
    color: var(--black);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .floating-stats .sep { color: var(--gray-300); }

  /* ─────────────────────────────────────
     FLOATING SECTION FILTER (bottom-center)
     ───────────────────────────────────── */
  .floating-filter {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    max-width: calc(100% - 40px);
    display: flex;
    gap: 6px;
    padding: 8px 10px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 100px;
    border: 1px solid rgba(0, 0, 0, 0.06);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .floating-filter::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 100px;
    background: transparent;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-700);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-chip:hover {
    background: var(--gray-100);
    color: var(--black);
  }
  .filter-chip.active {
    background: var(--primary);
    color: #fff;
  }
  .filter-chip .chip-count {
    display: inline-block;
    margin-left: 5px;
    padding: 1px 6px;
    background: rgba(0, 0, 0, 0.08);
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    color: inherit;
    font-variant-numeric: tabular-nums;
  }
  .filter-chip.active .chip-count {
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
  }

  /* ─────────────────────────────────────
     GALLERY MAIN
     ───────────────────────────────────── */
  .gallery-main {
    max-width: 1440px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .gallery-section {
    margin-bottom: 64px;
    scroll-margin-top: 100px;
  }
  .gallery-section:last-child { margin-bottom: 0; }
  .gallery-section.hidden { display: none; }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--gray-150);
  }
  .section-head h3 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--black);
  }
  .section-head .section-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    background: var(--primary-soft);
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
  }
  .section-head .section-count {
    margin-left: auto;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-500);
  }

  .screen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 24px;
  }

  /* ─────────────────────────────────────
     SCREEN CARD
     ───────────────────────────────────── */
  .screen-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    cursor: pointer;
    background: transparent;
    border: none;
    padding: 0;
    text-align: left;
    font-family: inherit;
    animation: fadeInUp 0.4s ease both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .screen-card-thumb {
    position: relative;
    aspect-ratio: 390 / 844;
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid var(--gray-150);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
  }
  .screen-card:hover .screen-card-thumb {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.14);
    border-color: var(--primary);
  }
  .screen-card-thumb iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 390px;
    height: 844px;
    border: none;
    transform-origin: top left;
    pointer-events: none;
    background: #fff;
  }
  /* iframe을 카드 크기에 맞춰 축소. 카드 너비가 220px일 때 scale = 220/390 ≈ 0.564 */
  /* aspect-ratio로 카드가 가변 폭이라 JS에서 계산해 적용 */

  .screen-card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(10, 10, 24, 0.35) 100%);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .screen-card:hover .screen-card-thumb::after { opacity: 1; }

  .expand-hint {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    padding: 7px 16px;
    background: var(--primary);
    color: #fff;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    white-space: nowrap;
    pointer-events: none;
    box-shadow: 0 4px 12px rgba(59, 95, 255, 0.4);
  }
  .screen-card:hover .expand-hint {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .screen-card-info {
    padding: 0 4px;
  }
  .screen-card-number {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-400);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
    font-family: 'JetBrains Mono', monospace;
  }
  .screen-card-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--black);
    line-height: 1.4;
  }

  /* ─────────────────────────────────────
     MODAL
     ───────────────────────────────────── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5, 5, 14, 0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
    padding: 40px 100px;
  }
  .modal-backdrop.show { opacity: 1; visibility: visible; }
  .modal {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.show .modal {
    animation: modalEnter 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes modalEnter {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Phone mockup */
  .phone {
    flex-shrink: 0;
    padding: 12px;
    background: #121220;
    border-radius: 48px;
    box-shadow:
      0 0 0 2px #2a2a3d,
      0 25px 50px rgba(0, 0, 0, 0.28),
      0 12px 24px rgba(0, 0, 0, 0.18);
    position: relative;
  }
  .phone-frame {
    position: relative;
    width: 390px;
    height: 844px;
    max-height: calc(100vh - 80px);
    background: #fff;
    border-radius: 36px;
    overflow: hidden;
  }
  .phone-notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 30px;
    background: #121220;
    border-radius: 100px;
    z-index: 10;
  }
  .phone-screen {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  .phone-screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
  }
  .phone-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 139px;
    height: 5px;
    background: #121220;
    border-radius: 100px;
    z-index: 10;
    pointer-events: none;
  }

  /* Modal controls */
  .modal-close {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1010;
  }
  .modal-close:hover {
    background: var(--primary);
    border-color: var(--primary);
    transform: rotate(90deg);
  }
  .modal-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1010;
  }
  .modal-arrow-prev { left: 24px; }
  .modal-arrow-next { right: 24px; }
  .modal-arrow:hover:not(:disabled) {
    background: var(--primary);
    border-color: var(--primary);
    transform: translateY(-50%) scale(1.08);
  }
  .modal-arrow:disabled { opacity: 0.25; cursor: not-allowed; }

  .modal-meta-float {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 1010;
    max-width: 340px;
    padding: 12px 18px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
  }
  .modal-section {
    display: inline-block;
    padding: 2px 10px;
    background: var(--primary);
    color: #fff;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  .modal-meta-float h2 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }
  .modal-counter-float {
    position: fixed;
    top: 32px;
    right: 84px;
    z-index: 1010;
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .modal-hints-float {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1010;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.75);
    white-space: nowrap;
  }
  .modal-hints-float .hint-sep { color: rgba(255, 255, 255, 0.3); }
  .modal-hints-float kbd {
    display: inline-block;
    padding: 1px 6px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-bottom-width: 2px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    min-width: 18px;
    text-align: center;
  }

  body.modal-open { overflow: hidden; }

  /* ─────────────────────────────────────
     RESPONSIVE
     ───────────────────────────────────── */
  @media (max-width: 900px) {
    body { padding-top: 80px; padding-bottom: 80px; }
    .floating-header {
      top: 12px; left: 12px;
      padding: 8px 14px 8px 8px;
    }
    .floating-header h1 { font-size: 13px; }
    .floating-header p { display: none; }
    .floating-header .brand-icon { width: 28px; height: 28px; font-size: 14px; }
    .floating-mode { top: 14px; padding: 3px; }
    .floating-mode a { padding: 7px 12px; font-size: 11px; }
    .floating-stats {
      top: 14px; right: 12px;
      padding: 10px 14px;
      font-size: 11px;
    }
    .floating-filter { bottom: 12px; max-width: calc(100% - 24px); }
    .filter-chip { padding: 7px 12px; font-size: 11px; }

    .gallery-main { padding: 0 16px; }
    .gallery-section { margin-bottom: 40px; }
    .section-head h3 { font-size: 19px; }
    .screen-grid {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }
    .screen-card-thumb { border-radius: 14px; }

    .modal-backdrop { padding: 16px; }
    .modal-arrow { width: 44px; height: 44px; }
    .modal-arrow-prev { left: 12px; }
    .modal-arrow-next { right: 12px; }
    .modal-close { top: 12px; right: 12px; width: 40px; height: 40px; }
    .modal-meta-float {
      top: 12px; left: 12px; right: 64px;
      max-width: none;
      padding: 8px 14px;
    }
    .modal-meta-float h2 { font-size: 13px; max-width: 100%; }
    .modal-section { font-size: 9px; }
    .modal-counter-float { display: none; }
    .phone-frame {
      width: 300px;
      height: 650px;
      border-radius: 32px;
      max-height: calc(100vh - 150px);
    }
    .modal-hints-float { display: none; }
  }
  @media (max-width: 520px) {
    .screen-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .phone-frame { width: 260px; height: 565px; }
  }
</style>
</head>
<body>

<!-- Floating header (top-left) -->
<div class="floating-header">
  <img class="brand-icon" src="/icons/icon-192.png?v=5" alt="김실장" width="34" height="34">
  <div>
    <h1>식당 원가 계산기</h1>
  </div>
</div>

<!-- Floating mode (top-center) -->
<div class="floating-mode">
  <a href="./gallery.html" class="active">🖼️ Screen Gallery</a>
  <a href="/cost-calculator/">📱 Live App</a>
</div>

<!-- Floating stats (top-right) -->
<div class="floating-stats">
  <span><strong id="totalCount">—</strong> screens</span>
  <span class="sep">·</span>
  <span id="sectionCount">— sections</span>
</div>

<!-- Gallery grid -->
<main class="gallery-main" id="galleryMain"></main>

<!-- Floating section filter (bottom-center) -->
<nav class="floating-filter" id="sectionFilter"></nav>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" id="modalClose" aria-label="닫기">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <button class="modal-arrow modal-arrow-prev" id="modalPrev" aria-label="이전">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>

    <div class="phone">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <iframe id="modalFrame" title="screen preview"></iframe>
        </div>
        <div class="phone-indicator"></div>
      </div>
    </div>

    <button class="modal-arrow modal-arrow-next" id="modalNext" aria-label="다음">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>

    <div class="modal-meta-float">
      <span class="modal-section" id="modalSection">—</span>
      <h2 id="modalTitle">—</h2>
    </div>
    <div class="modal-counter-float">
      <span id="modalCounter">— / —</span>
    </div>
    <div class="modal-hints-float">
      <span><kbd>←</kbd> <kbd>→</kbd> 이동</span>
      <span class="hint-sep">·</span>
      <span><kbd>⎋</kbd> 닫기</span>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────
// SCREEN DEFINITIONS
// ─────────────────────────────────────
const APP = '/cost-calculator/';
const SCREENS = [
  // ONBOARDING
  { section: '온보딩',   number: 'A-01', name: '온보딩 · 업종 선택',          url: `${APP}?demo=1&state=onboarding` },
  { section: '온보딩',   number: 'A-02', name: '홈 · 비로그인 상태',          url: `${APP}?demo=1&state=guest&screen=home` },

  // HOME — 진단 화면
  { section: '홈',       number: 'B-01', name: '홈 · 진단 + 어드바이스',     url: `${APP}?demo=1&screen=home` },

  // 식자재
  { section: '식자재',   number: 'C-01', name: '식자재 목록',                 url: `${APP}?demo=1&screen=ingredients` },
  { section: '식자재',   number: 'C-02', name: '영수증으로 식자재 등록',       url: `${APP}?demo=1&screen=receipt` },
  { section: '식자재',   number: 'C-03', name: '식자재 편집 · 로스율 관리',   url: `${APP}?demo=1&screen=ing-editor` },

  // 메뉴
  { section: '메뉴',     number: 'D-01', name: '메뉴 목록 · 원가율 한눈에',   url: `${APP}?demo=1&screen=menus` },
  { section: '메뉴',     number: 'D-02', name: '메뉴 편집 · 레시피 + 어드바이스', url: `${APP}?demo=1&screen=menu-editor` },

  // 설정
  { section: '설정',     number: 'F-01', name: '설정 · 메인',                 url: `${APP}?demo=1&screen=settings` },
  { section: '설정',     number: 'F-02', name: '가게 업종 · 원가율 목표',     url: `${APP}?demo=1&screen=category` },
  { section: '설정',     number: 'F-03', name: '가게 정보 편집',              url: `${APP}?demo=1&screen=store-info` },
  { section: '설정',     number: 'F-04', name: '김실장 프리미엄 구독',        url: `${APP}?demo=1&screen=premium` },

  // LEGAL
  { section: '약관/정책', number: 'G-01', name: '이용약관',                   url: `${APP}?demo=1&screen=terms` },
  { section: '약관/정책', number: 'G-02', name: '개인정보처리방침',           url: `${APP}?demo=1&screen=privacy` },
];

// ─────────────────────────────────────
// STATE
// ─────────────────────────────────────
let currentFilter = 'all';
let currentModalIndex = -1;

// ─────────────────────────────────────
// BUILD GRID
// ─────────────────────────────────────
function groupBySection(screens) {
  const map = new Map();
  screens.forEach(s => {
    if (!map.has(s.section)) map.set(s.section, []);
    map.get(s.section).push(s);
  });
  return map;
}

function buildGallery() {
  const main = document.getElementById('galleryMain');
  main.innerHTML = '';
  const grouped = groupBySection(SCREENS);
  let sectionIdx = 0;
  let globalIdx = 0;
  grouped.forEach((screens, sectionName) => {
    sectionIdx++;
    const section = document.createElement('section');
    section.className = 'gallery-section';
    section.dataset.section = sectionName;

    const head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML = `
      <span class="section-num">${String(sectionIdx).padStart(2, '0')}</span>
      <h3>${sectionName}</h3>
      <span class="section-count">${screens.length}개 화면</span>
    `;
    section.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'screen-grid';
    screens.forEach(s => {
      const idx = globalIdx++;
      const card = document.createElement('button');
      card.className = 'screen-card';
      card.dataset.index = idx;
      card.innerHTML = `
        <div class="screen-card-thumb">
          <iframe src="${s.url}" loading="lazy" tabindex="-1" title="${s.name}"></iframe>
          <span class="expand-hint">크게 보기 ↗</span>
        </div>
        <div class="screen-card-info">
          <span class="screen-card-number">${s.number}</span>
          <span class="screen-card-name">${s.name}</span>
        </div>
      `;
      card.addEventListener('click', () => openModal(idx));
      grid.appendChild(card);
    });
    section.appendChild(grid);
    main.appendChild(section);
  });

  // stats
  document.getElementById('totalCount').textContent = SCREENS.length;
  document.getElementById('sectionCount').textContent = grouped.size + ' sections';

  // filter chips
  const filter = document.getElementById('sectionFilter');
  filter.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip active';
  allChip.dataset.section = 'all';
  allChip.innerHTML = `전체 <span class="chip-count">${SCREENS.length}</span>`;
  allChip.addEventListener('click', () => setFilter('all'));
  filter.appendChild(allChip);
  grouped.forEach((screens, sectionName) => {
    const chip = document.createElement('button');
    chip.className = 'filter-chip';
    chip.dataset.section = sectionName;
    chip.innerHTML = `${sectionName} <span class="chip-count">${screens.length}</span>`;
    chip.addEventListener('click', () => setFilter(sectionName));
    filter.appendChild(chip);
  });

  // scale iframes to fit card
  requestAnimationFrame(scaleThumbs);
}

function scaleThumbs() {
  document.querySelectorAll('.screen-card-thumb').forEach(thumb => {
    const w = thumb.offsetWidth;
    const scale = w / 390;
    const iframe = thumb.querySelector('iframe');
    if (iframe) {
      iframe.style.transform = `scale(${scale})`;
    }
  });
}
window.addEventListener('resize', scaleThumbs);

// ─────────────────────────────────────
// FILTER
// ─────────────────────────────────────
function setFilter(section) {
  currentFilter = section;
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.section === section);
  });
  document.querySelectorAll('.gallery-section').forEach(s => {
    s.classList.toggle('hidden', section !== 'all' && s.dataset.section !== section);
  });
  if (section !== 'all') {
    const target = document.querySelector(`.gallery-section[data-section="${section}"]`);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ─────────────────────────────────────
// MODAL
// ─────────────────────────────────────
const backdrop = document.getElementById('modalBackdrop');
const modalFrame = document.getElementById('modalFrame');
const modalTitle = document.getElementById('modalTitle');
const modalSection = document.getElementById('modalSection');
const modalCounter = document.getElementById('modalCounter');
const modalPrev = document.getElementById('modalPrev');
const modalNext = document.getElementById('modalNext');

function openModal(index) {
  currentModalIndex = index;
  const s = SCREENS[index];
  if (!s) return;
  modalFrame.src = s.url;
  modalTitle.textContent = s.name;
  modalSection.textContent = s.section;
  modalCounter.textContent = `${index + 1} / ${SCREENS.length}`;
  modalPrev.disabled = index === 0;
  modalNext.disabled = index === SCREENS.length - 1;
  backdrop.classList.add('show');
  backdrop.setAttribute('aria-hidden', 'false');
  document.body.classList.add('modal-open');
}
function closeModal() {
  backdrop.classList.remove('show');
  backdrop.setAttribute('aria-hidden', 'true');
  document.body.classList.remove('modal-open');
  setTimeout(() => { modalFrame.src = 'about:blank'; }, 300);
  currentModalIndex = -1;
}
function navModal(delta) {
  const next = currentModalIndex + delta;
  if (next < 0 || next >= SCREENS.length) return;
  openModal(next);
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modalPrev.addEventListener('click', () => navModal(-1));
modalNext.addEventListener('click', () => navModal(1));
backdrop.addEventListener('click', (e) => {
  if (e.target === backdrop) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (currentModalIndex < 0) return;
  if (e.key === 'Escape') closeModal();
  else if (e.key === 'ArrowLeft') navModal(-1);
  else if (e.key === 'ArrowRight') navModal(1);
});

// ─────────────────────────────────────
// INIT
// ─────────────────────────────────────
buildGallery();
</script>
</body>
</html>
